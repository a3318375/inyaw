name: java CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 安装jdk21 graalvm
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
      - name: 查看版本信息
        run: |
          java --version
          native-image --version
      - name: 编译
        run: gradlew nativeCompile
      - uses: mr-smithers-excellent/docker-build-push@v5
        name: 编译docker镜像
        with:
          image: inyaa/inyaw
          tags: latest
          registry: docker.io
          dockerfile: Dockerfile
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: ssh部署
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          script: |
            sudo docker stop $(sudo docker ps -a | grep "inyaw" | awk '{print $1}')
            sudo docker rm -f $(sudo docker ps -a | grep inyaw | awk '{print $1}')
            sudo docker rmi $(sudo docker images | grep inyaw | awk '{print $3}')
            sudo docker run -d -p 8080:8080 --name inyaw --network inyaw --network-alias inyaw  inyaa/inyaw:latest
      #     arguments: bootBuildImage
